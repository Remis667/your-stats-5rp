<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT WEBMESH // HUD MATRIX</title>
    <style>
        :root {
            --bg: #010101;
            --panel: rgba(4, 2, 2, 0.4);
            --panel-blur: blur(15px);
            --accent: #ff0000;
            --accent-glow: rgba(255, 0, 0, 0.7);
            --accent-dim: rgba(255, 0, 0, 0.1);
            --text: #ffffff;
            --border: rgba(255, 0, 0, 0.25);
        }

        ::-webkit-scrollbar { width: 4px; background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', 'Courier New', monospace; }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-transform: uppercase;
            overflow: hidden;
            position: relative;
        }

        /* CRT Сканирование */
        body::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            z-index: 99999; pointer-events: none; background-size: 100% 4px; opacity: 0.4;
        }

        .top-bar {
            width: 100%; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--accent-dim); border-bottom: 2px solid var(--accent);
            padding: 12px 20px; margin-bottom: 15px; background: rgba(3, 1, 1, 0.9); backdrop-filter: blur(10px);
        }

        .title { font-size: 1.1rem; font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 8px var(--accent); }
        .status { background: rgba(255, 0, 0, 0.15); border: 1px solid var(--accent); padding: 3px 10px; font-size: 0.65rem; letter-spacing: 2px; }

        /* ВЕРХНЯЯ СТАТИСТИКА */
        .overall-panel {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px; margin-bottom: 15px; width: 100%; max-width: 1600px; margin-left: auto; margin-right: auto;
        }

        .overall-card { background: rgba(6, 1, 1, 0.85); border-left: 3px solid var(--accent); padding: 12px 15px; border-top: 1px solid rgba(255,255,255,0.01); }
        .overall-card .label { font-size: 0.6rem; color: #555; letter-spacing: 1px; }
        .overall-card .value { font-size: 1.3rem; font-weight: 900; margin-top: 3px; }
        .overall-card .value span { color: var(--accent); }

        /* ТАЙМЕР И НАВИГАЦИЯ В ОДНУ ЛИНИЮ */
        .hud-control-container {
            display: flex; flex-direction: column; gap: 10px; background: var(--panel); 
            border: 1px solid var(--border); padding: 15px; backdrop-filter: var(--panel-blur);
            max-width: 1600px; width: 100%; margin: 0 auto 15px auto;
        }

        .hud-top-line { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; border-bottom: 1px dashed rgba(255,0,0,0.15); padding-bottom: 10px; }

        /* ИНТЕГРИРОВАННЫЙ СЛЕВА ХЕДЕР ПЕРЕКЛЮЧАТЕЛЬ */
        .tab-nav { display: flex; gap: 5px; }
        .tab-btn { 
            background: rgba(0,0,0,0.6); border: 1px solid #222; color: #444; 
            padding: 8px 24px; font-size: 0.85rem; font-weight: 900; letter-spacing: 2px; 
            cursor: pointer; transition: all 0.2s; position: relative;
        }
        .tab-btn:hover { color: #aaa; border-color: #444; }
        .tab-btn.active { 
            color: #fff; border-color: var(--accent); 
            background: linear-gradient(180deg, rgba(255,0,0,0.1), transparent);
            text-shadow: 0 0 6px var(--accent); box-shadow: inset 0 0 8px rgba(255,0,0,0.1);
        }
        .tab-btn.active::before {
            content: ''; position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
            width: 40%; height: 2px; background: var(--accent); box-shadow: 0 0 8px var(--accent);
        }

        /* ТАЙМЕР БОКС ВНУТРИ HUD */
        .timer-box { display: flex; align-items: center; gap: 10px; }
        .timer-display { font-size: 1.2rem; font-weight: 900; color: var(--accent); text-shadow: 0 0 6px var(--accent); min-width: 60px; }
        .timer-input { background: #000; border: 1px solid #222; color: #fff; padding: 4px 8px; max-width: 70px; text-align: center; font-size: 0.8rem; }
        .timer-btn { background: transparent; border: 1px solid #333; color: #aaa; padding: 0 10px; cursor: pointer; height: 24px; font-size: 0.7rem; font-weight: bold; }
        .timer-btn:hover { border-color: #fff; color: #fff; }
        .timer-box.alert { animation: blink-alert 0.5s infinite; }
        @keyframes blink-alert {
            0%, 100% { background: transparent; }
            50% { background: rgba(40,0,0,0.4); }
        }

        /* ПОЛЯ ВВОДА */
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; width: 100%; margin-top: 5px; }
        input, select { background: rgba(0, 0, 0, 0.8); border: 1px solid #222; color: #fff; padding: 8px 12px; font-size: 0.8rem; outline: none; letter-spacing: 1px; flex: 1; min-width: 110px; }
        input:focus, select:focus { border-color: var(--accent); }

        button.action-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 0 25px; font-size: 1.2rem; font-weight: 900; cursor: pointer; }
        button.action-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }

        /* ОКНО СЕТИ */
        .main-container { flex: 1; width: 100%; max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; overflow: hidden; }
        .network-viewport {
            position: relative; flex: 1; background: #020202; border: 1px solid var(--border); overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,1);
        }
        canvas { display: block; width: 100%; height: 100%; cursor: grab; }
        canvas:active { cursor: grabbing; }

        /* ТУЛТИП */
        .osint-tooltip {
            position: absolute; background: rgba(4, 1, 1, 0.98); border: 1px solid var(--accent); padding: 12px; display: none; pointer-events: none; z-index: 1000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); width: 230px; backdrop-filter: blur(5px);
        }
        .osint-tooltip .node-title { font-size: 0.8rem; font-weight: bold; color: #fff; border-bottom: 1px solid var(--accent); padding-bottom: 5px; margin-bottom: 8px; text-shadow: 0 0 5px var(--accent); }
        .osint-tooltip .data-row { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 4px; padding-bottom: 2px; border-bottom: 1px dashed rgba(255,255,255,0.03); }
        .osint-tooltip .data-row .field { color: #555; }
        .osint-tooltip .data-row .val { color: #fff; font-weight: bold; }
        .osint-tooltip .data-row .val.high { color: #00ff66; text-shadow: 0 0 5px rgba(0,255,102,0.4); }

        .map-instruction { position: absolute; bottom: 10px; left: 10px; font-size: 0.65rem; color: #444; letter-spacing: 1px; pointer-events: none; }
        .map-instruction span { color: var(--accent); }

        .purge-btn {
            position: absolute; bottom: 10px; right: 10px; background: rgba(15, 2, 2, 0.8);
            border: 1px dashed var(--accent); color: var(--accent); padding: 6px 12px; font-size: 0.65rem; font-weight: bold; cursor: pointer; letter-spacing: 1px; z-index: 10;
        }
        .purge-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 10px var(--accent); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="title">ROOT@TERRY:_# HUD_WEBMESH_SYSTEM</div>
        <div class="status">[ GRID_STATUS_ACTIVE ]</div>
    </div>

    <div class="overall-panel">
        <div class="overall-card">
            <div class="label">TOTAL DAMAGE COMBINED</div>
            <div class="value" id="total-damage-val">0 <span>HP</span></div>
        </div>
        <div class="overall-panel" style="grid-template-columns: 1fr 1fr; margin: 0; gap: 12px;">
            <div class="overall-card">
                <div class="label">TOTAL KILLS REGISTERED</div>
                <div class="value" id="total-kills-val">0 <span>KILLS</span></div>
            </div>
            <div class="overall-card">
                <div class="label">GLOBAL K/D RATIO</div>
                <div class="value" id="global-kd-val">0.00</div>
            </div>
        </div>
    </div>

    <div class="hud-control-container">
        <div class="hud-top-line">
            <div class="tab-nav">
                <button class="tab-btn active" id="tab-dm" onclick="switchTab('dm')">DM MATRIX</button>
                <button class="tab-btn" id="tab-vzp" onclick="switchTab('vzp')">VZP PATROL</button>
                <button class="tab-btn" id="tab-capt" onclick="switchTab('capt')">CAPT ZONE</button>
            </div>

            <div class="timer-box" id="timer-box">
                <div class="timer-display" id="timer-display">00:00</div>
                <input type="number" id="custom-minutes" class="timer-input" placeholder="MIN">
                <button class="timer-btn" onclick="startCustomTimer()" style="color: #00ff66;">START</button>
                <button class="timer-btn" onclick="stopTimer()" style="color: var(--accent);">RESET</button>
            </div>
        </div>

        <div class="input-area">
            <div id="panel-dm" class="input-group">
                <select id="dm-weapon">
                    <option value="SPECIAL RIFLE">SPECIAL RIFLE</option>
                    <option value="REVOLVER">REVOLVER</option>
                </select>
                <select id="dm-type" onchange="updateDmFields()">
                    <option value="FULL DM">FULL DM</option>
                    <option value="1X1 DM">1X1 DM</option>
                </select>
                <div id="dm-dynamic-container" style="display: flex; flex:1;">
                    <input type="number" id="dm-damage" placeholder="DAMAGE">
                </div>
                <button class="action-btn" onclick="addDmLog()">+</button>
            </div>

            <div id="panel-vzp" class="input-group" style="display:none;">
                <input type="text" id="vzp-server" placeholder="SERVER NAME" oninput="this.value = this.value.toUpperCase()">
                <input type="number" id="vzp-kills" placeholder="KILLS">
                <input type="number" id="vzp-deaths" placeholder="DEATHS">
                <input type="number" id="vzp-damage" placeholder="DAMAGE">
                <button class="action-btn" onclick="addVzpLog()">+</button>
            </div>

            <div id="panel-capt" class="input-group" style="display:none;">
                <input type="text" id="capt-server" placeholder="SERVER" oninput="this.value = this.value.toUpperCase()">
                <input type="number" id="capt-kills" placeholder="KILLS">
                <input type="number" id="capt-deaths" placeholder="DEATHS">
                <input type="number" id="capt-damage" placeholder="DAMAGE">
                <input type="number" id="capt-hs" placeholder="HS %" max="100">
                <input type="number" id="capt-hit" placeholder="HIT %" max="100">
                <button class="action-btn" onclick="addCaptLog()">+</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="network-viewport" id="viewport">
            <canvas id="netCanvas"></canvas>
            <div class="osint-tooltip" id="osintTooltip"></div>
            
            <div class="map-instruction">
                [ MOUSE: <span>DRAG & ZOOM</span> // DOUBLE-CLICK NODE: <span>ERASE MATCH</span> ]
            </div>

            <button class="purge-btn" onclick="purgeCurrentGraph()">[ PURGE_CURRENT_GRID ]</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('cyberStatsDB')) || { dm: [], vzp: [], capt: [] };
        let currentTab = 'dm';
        let countdownInterval = null;

        const canvas = document.getElementById('netCanvas');
        const ctx = canvas.getContext('2d');
        let nodes = []; let links = []; let hoveredNode = null; let draggedNode = null;
        
        let transform = { x: 0, y: 0, zoom: 1 };
        let isPanning = false; let panStart = { x: 0, y: 0 };
        let dataPackets = []; let particles = [];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            if (type === 'click') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.01, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            } else if (type === 'success') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(250, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            } else if (type === 'wipe') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(20, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            }
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }

        function saveDB() {
            localStorage.setItem('cyberStatsDB', JSON.stringify(db));
            updateOverallStats(); buildGraph();
        }

        function purgeCurrentGraph() {
            if (confirm(`WIPE ALL LOGS INSIDE ${currentTab.toUpperCase()} GRID?`)) {
                db[currentTab] = []; document.getElementById('osintTooltip').style.display = 'none';
                playSound('wipe'); saveDB();
            }
        }

        function switchTab(tabName) {
            playSound('click');
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');

            document.getElementById('panel-dm').style.display = tabName === 'dm' ? 'flex' : 'none';
            document.getElementById('panel-vzp').style.display = tabName === 'vzp' ? 'flex' : 'none';
            document.getElementById('panel-capt').style.display = tabName === 'capt' ? 'flex' : 'none';

            transform = { x: 0, y: 0, zoom: 1 }; buildGraph();
        }

        function getTodayDate() { return new Date().toLocaleDateString('ru-RU'); }
        function getCurrentTimeStr() {
            const n = new Date();
            return `${n.getHours() < 10 ? '0'+n.getHours() : n.getHours()}:${n.getMinutes() < 10 ? '0'+n.getMinutes() : n.getMinutes()}`;
        }

        function updateDmFields() {
            const m = document.getElementById('dm-type').value;
            const c = document.getElementById('dm-dynamic-container');
            c.innerHTML = m === 'FULL DM' ? `<input type="number" id="dm-damage" placeholder="DAMAGE">` : `<input type="number" id="dm-kills" placeholder="KILLS">`;
        }

        function addDmLog() {
            const weapon = document.getElementById('dm-weapon').value;
            const type = document.getElementById('dm-type').value;
            let damage = parseInt(document.getElementById('dm-damage')?.value) || 0;
            let kills = parseInt(document.getElementById('dm-kills')?.value) || 0;
            db.dm.push({ id: Math.random().toString(36).substring(2, 11), date: getTodayDate(), time: getCurrentTimeStr(), weapon, type, damage, kills });
            playSound('success'); saveDB();
            if(document.getElementById('dm-damage')) document.getElementById('dm-damage').value = '';
            if(document.getElementById('dm-kills')) document.getElementById('dm-kills').value = '';
        }

        function addVzpLog() {
            const server = document.getElementById('vzp-server').value.trim().toUpperCase();
            const kills = parseInt(document.getElementById('vzp-kills').value) || 0;
            const deaths = parseInt(document.getElementById('vzp-deaths').value) || 0;
            const damage = parseInt(document.getElementById('vzp-damage').value) || 0;
            if(!server) return;
            db.vzp.push({ id: Math.random().toString(36).substring(2, 11), date: getTodayDate(), time: getCurrentTimeStr(), server, kills, deaths, damage });
            playSound('success'); saveDB();
            document.getElementById('vzp-server').value=''; document.getElementById('vzp-kills').value=''; document.getElementById('vzp-deaths').value=''; document.getElementById('vzp-damage').value='';
        }

        function addCaptLog() {
            const server = document.getElementById('capt-server').value.trim().toUpperCase();
            const kills = parseInt(document.getElementById('capt-kills').value) || 0;
            const deaths = parseInt(document.getElementById('capt-deaths').value) || 0;
            const damage = parseInt(document.getElementById('capt-damage').value) || 0;
            const hs = document.getElementById('capt-hs').value ? document.getElementById('capt-hs').value + '%' : '0%';
            const hit = document.getElementById('capt-hit').value ? document.getElementById('capt-hit').value + '%' : '0%';
            if(!server) return;
            db.capt.push({ id: Math.random().toString(36).substring(2, 11), date: getTodayDate(), time: getCurrentTimeStr(), server, kills, deaths, damage, hs, hit });
            playSound('success'); saveDB();
            document.getElementById('capt-server').value=''; document.getElementById('capt-kills').value=''; document.getElementById('capt-deaths').value=''; document.getElementById('capt-damage').value=''; document.getElementById('capt-hs').value=''; document.getElementById('capt-hit').value='';
        }

        function updateOverallStats() {
            let td = 0, tk = 0, det = 0;
            db.dm.forEach(i => { td += i.damage; tk += i.kills; });
            db.vzp.forEach(i => { td += i.damage; tk += i.kills; det += i.deaths; });
            db.capt.forEach(i => { td += i.damage; tk += i.kills; det += i.deaths; });
            document.getElementById('total-damage-val').innerHTML = `${td} <span>HP</span>`;
            document.getElementById('total-kills-val').innerHTML = `${tk} <span>KILLS</span>`;
            document.getElementById('global-kd-val').innerText = det === 0 ? tk.toFixed(2) : (tk / det).toFixed(2);
        }

        function resizeCanvas() {
            canvas.width = document.getElementById('viewport').clientWidth;
            canvas.height = document.getElementById('viewport').clientHeight;
        }

        function buildGraph() {
            nodes = []; links = []; dataPackets = [];
            const cx = canvas.width / 2; const cy = canvas.height / 2;

            if (currentTab === 'dm') {
                let sessionNode = { id: 'dm_root', label: `MATRIX SESSION`, type: 'root', x: cx, y: cy, fx: cx, fy: cy };
                nodes.push(sessionNode);
                let weapons = [...new Set(db.dm.map(x => x.weapon))];
                weapons.forEach((wpn, wIdx) => {
                    let wNode = { id: `w_${wpn}`, label: wpn, type: 'core', x: cx + (wIdx - (weapons.length-1)/2)*260, y: cy - 110 };
                    nodes.push(wNode); links.push({ source: sessionNode, target: wNode });

                    let modes = ['FULL DM', '1X1 DM'];
                    modes.forEach((md, mIdx) => {
                        let mNode = { id: `m_${wpn}_${md}`, label: md, type: 'subcore', x: wNode.x + (mIdx === 0 ? -90 : 90), y: cy - 20 };
                        nodes.push(mNode); links.push({ source: wNode, target: mNode });

                        let logs = db.dm.filter(x => x.weapon === wpn && x.type === md);
                        logs.forEach((lg, lIdx) => {
                            let performance = lg.type === 'FULL DM' ? (lg.damage > 550 ? 'high' : 'low') : (lg.kills >= 5 ? 'high' : 'low');
                            let lNode = { id: lg.id, label: `LOG [${lg.time}]`, type: 'datapoint', threat: performance, rawData: lg, category: 'dm', x: mNode.x + (lIdx - (logs.length-1)/2)*80, y: mNode.y + 110 + (lIdx * 15) };
                            nodes.push(lNode); links.push({ source: mNode, target: lNode });
                        });
                    });
                });
            } else {
                let arr = db[currentTab]; let servers = [...new Set(arr.map(x => x.server))];
                servers.forEach((srv, sIdx) => {
                    let sNode = { id: `srv_${srv}`, label: `NET_NODE: ${srv}`, type: 'core', x: cx + (sIdx - (servers.length-1)/2)*340, y: cy };
                    nodes.push(sNode);
                    let sLogs = arr.filter(x => x.server === srv);
                    sLogs.forEach((lg, lIdx) => {
                        let kd = lg.deaths === 0 ? lg.kills : lg.kills / lg.deaths;
                        let performance = kd >= 2.0 ? 'high' : (kd < 1.0 ? 'low' : 'normal');
                        let angle = (lIdx / sLogs.length) * Math.PI * 2; let dist = 110 + (lIdx * 15);
                        let lNode = { id: lg.id, label: `MATCH_${lg.time}`, type: 'datapoint', threat: performance, rawData: lg, category: currentTab, x: sNode.x + Math.cos(angle) * dist, y: sNode.y + Math.sin(angle) * dist };
                        nodes.push(lNode); links.push({ source: sNode, target: lNode });
                    });
                });
            }
            links.forEach(l => { if (Math.random() > 0.4) dataPackets.push({ link: l, progress: Math.random(), speed: 0.003 + Math.random()*0.004 }); });
        }

        function updatePhysics() {
            if (draggedNode) return;
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    let n1 = nodes[i]; let n2 = nodes[j];
                    let dx = n2.x - n1.x; let dy = n2.y - n1.y; let dist = Math.hypot(dx, dy) || 1;
                    let minDist = n1.type === 'datapoint' ? 60 : 120;
                    if (dist < minDist) {
                        let force = (minDist - dist) * 0.025;
                        n1.x -= (dx / dist) * force; n1.y -= (dy / dist) * force;
                        n2.x += (dx / dist) * force; n2.y += (dy / dist) * force;
                    }
                }
            }
            links.forEach(link => {
                let dx = link.target.x - link.source.x; let dy = link.target.y - link.source.y;
                let dist = Math.hypot(dx, dy) || 1; let targetDist = link.target.type === 'datapoint' ? 70 : 140;
                let force = (dist - targetDist) * 0.015;
                if (link.source.type !== 'root') { link.source.x += (dx / dist) * force; link.source.y += (dy / dist) * force; }
                link.target.x -= (dx / dist) * force; link.target.y -= (dy / dist) * force;
            });
        }

        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ПАРАЛЛАКС ФОН
            ctx.save();
            ctx.translate(transform.x * 0.25, transform.y * 0.25);
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.02)'; ctx.lineWidth = 1;
            for (let x = -2000; x < 3000; x += 60) { ctx.beginPath(); ctx.moveTo(x, -2000); ctx.lineTo(x, 3000); ctx.stroke(); }
            for (let y = -2000; y < 3000; y += 60) { ctx.beginPath(); ctx.moveTo(-2000, y); ctx.lineTo(3000, y); ctx.stroke(); }
            ctx.restore();

            // СЕТЬ И КИБЕРПАУТИНА
            ctx.save(); ctx.translate(transform.x, transform.y); ctx.scale(transform.zoom, transform.zoom);

            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    let n1 = nodes[i]; let n2 = nodes[j];
                    if(n1.type === 'datapoint' && n2.type === 'datapoint') {
                        let d = Math.hypot(n2.x - n1.x, n2.y - n1.y);
                        if(d < 110) {
                            ctx.beginPath(); ctx.moveTo(n1.x, n1.y); ctx.lineTo(n2.x, n2.y);
                            ctx.strokeStyle = `rgba(255, 0, 0, ${0.08 * (1 - d/110)})`; ctx.lineWidth = 0.5; ctx.stroke();
                        }
                    }
                }
            }

            links.forEach(l => {
                ctx.beginPath(); ctx.moveTo(l.source.x, l.source.y); ctx.lineTo(l.target.x, l.target.y);
                ctx.strokeStyle = l.target.type === 'datapoint' ? 'rgba(255,0,0,0.12)' : 'rgba(255,0,0,0.4)';
                ctx.lineWidth = l.target.type === 'datapoint' ? 1 : 1.5; ctx.stroke();
            });

            dataPackets.forEach(p => {
                p.progress += p.speed; if (p.progress > 1) p.progress = 0;
                let pkX = p.link.source.x + (p.link.target.x - p.link.source.x) * p.progress;
                let pkY = p.link.source.y + (p.link.target.y - p.link.source.y) * p.progress;
                ctx.beginPath(); ctx.arc(pkX, pkY, 2.5, 0, Math.PI*2); ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 6; ctx.shadowColor = '#ff0000'; ctx.fill(); ctx.shadowBlur = 0;
            });

            nodes.forEach(n => {
                ctx.beginPath(); let radius = 5; let color = '#fff';
                if (n.type === 'root') { radius = 9; color = '#ff0000'; }
                else if (n.type === 'core') { radius = 7; color = '#ce0000'; }
                else if (n.type === 'subcore') { radius = 5.5; color = '#8c0000'; }
                else if (n.type === 'datapoint') {
                    radius = 4;
                    if (n.threat === 'high') color = '#00ff66';
                    else if (n.threat === 'low') color = '#3a3a3a';
                    else color = '#ff9900';
                }
                if (hoveredNode === n) { radius += 2.5; ctx.shadowBlur = 12; ctx.shadowColor = color; }
                ctx.arc(n.x, n.y, radius, 0, Math.PI * 2); ctx.fillStyle = color; ctx.fill(); ctx.shadowBlur = 0;
                ctx.fillStyle = n.type === 'datapoint' ? '#666' : '#fff';
                ctx.font = n.type === 'root' || n.type === 'core' ? 'bold 10px Consolas' : '9px Consolas';
                ctx.fillText(n.label, n.x + radius + 5, n.y + 3);
            });

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.03;
                if (p.alpha <= 0) { particles.splice(i, 1); continue; }
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fillStyle = `rgba(255, 0, 0, ${p.alpha})`; ctx.fill();
            }
            ctx.restore();
        }

        function updateLoop() { updatePhysics(); drawGraph(); requestAnimationFrame(updateLoop); }

        function getCanvasMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: (e.clientX - rect.left - transform.x) / transform.zoom, y: (e.clientY - rect.top - transform.y) / transform.zoom };
        }

        canvas.addEventListener('mousedown', e => {
            const m = getCanvasMousePos(e); let clickedNode = null;
            for (let n of nodes) { if (Math.hypot(n.x - m.x, n.y - m.y) < 15) { clickedNode = n; break; } }
            if (clickedNode) { draggedNode = clickedNode; } 
            else { isPanning = true; panStart.x = e.clientX - transform.x; panStart.y = e.clientY - transform.y; }
        });

        canvas.addEventListener('mousemove', e => {
            const m = getCanvasMousePos(e);
            if (draggedNode) { draggedNode.x = m.x; draggedNode.y = m.y; return; }
            if (isPanning) { transform.x = e.clientX - panStart.x; transform.y = e.clientY - panStart.y; return; }

            let found = null;
            for (let n of nodes) { if (Math.hypot(n.x - m.x, n.y - m.y) < 15) { found = n; break; } }
            hoveredNode = found; const tooltip = document.getElementById('osintTooltip');

            if (hoveredNode && hoveredNode.type === 'datapoint') {
                let data = hoveredNode.rawData; let html = '';
                if (hoveredNode.category === 'dm') {
                    html = `
                        <div class="node-title">${data.weapon}</div>
                        <div class="data-row"><span class="field">TYPE:</span><span class="val">${data.type}</span></div>
                        <div class="data-row"><span class="field">SCORE:</span><span class="val ${hoveredNode.threat==='high'?'high':''}">${data.type==='FULL DM'?data.damage+' HP':data.kills+' K'}</span></div>
                        <div class="data-row"><span class="field">INDEX:</span><span class="val" style="color:#666;">${data.time}</span></div>
                    `;
                } else {
                    let kd = data.deaths === 0 ? data.kills.toFixed(2) : (data.kills / data.deaths).toFixed(2);
                    html = `
                        <div class="node-title">${hoveredNode.category.toUpperCase()} WORKFLOW</div>
                        <div class="data-row"><span class="field">SERVER:</span><span class="val">${data.server}</span></div>
                        <div class="data-row"><span class="field">PERF K/D:</span><span class="val ${kd>=2?'high':''}">${kd}</span></div>
                        <div class="data-row"><span class="field">DMG DONE:</span><span class="val">${data.damage} HP</span></div>
                        <div class="data-row"><span class="field">INDEX:</span><span class="val" style="color:#666;">${data.time}</span></div>
                    `;
                }
                tooltip.innerHTML = html; tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX - canvas.getBoundingClientRect().left + 15) + 'px';
                tooltip.style.top = (e.clientY - canvas.getBoundingClientRect().top + 15) + 'px';
            } else { tooltip.style.display = 'none'; }
        });

        window.addEventListener('mouseup', () => { draggedNode = null; isPanning = false; });
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            if (e.deltaY < 0) transform.zoom = Math.min(transform.zoom * 1.08, 2.5);
            else transform.zoom = Math.max(transform.zoom / 1.08, 0.4);
        });

        canvas.addEventListener('dblclick', e => {
            const m = getCanvasMousePos(e); let targetNode = null;
            for (let n of nodes) { if (Math.hypot(n.x - m.x, n.y - m.y) < 15 && n.type === 'datapoint') { targetNode = n; break; } }
            if (targetNode) {
                for(let i=0; i<15; i++) { particles.push({ x: targetNode.x, y: targetNode.y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4, r: 1.5 + Math.random()*2, alpha: 1 }); }
                let idxInDb = db[targetNode.category].findIndex(x => x.id === targetNode.id);
                if(idxInDb !== -1) db[targetNode.category].splice(idxInDb, 1);
                document.getElementById('osintTooltip').style.display = 'none';
                playSound('wipe'); saveDB();
            }
        });

        function startCustomTimer() {
            let iv = parseInt(document.getElementById('custom-minutes').value); if (!iv || iv <= 0) return;
            playSound('success'); clearInterval(countdownInterval);
            document.getElementById('timer-box').classList.remove('alert'); let sec = iv * 60;
            countdownInterval = setInterval(() => {
                sec--; let m = Math.floor(sec / 60); let s = sec % 60;
                document.getElementById('timer-display').innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
                if (sec <= 45 && sec > 0) document.getElementById('timer-box').classList.add('alert');
                if (sec <= 0) { clearInterval(countdownInterval); document.getElementById('timer-display').innerText = "00:00"; }
            }, 1000);
        }
        function stopTimer() { clearInterval(countdownInterval); document.getElementById('timer-display').innerText = "00:00"; }

        window.addEventListener('resize', () => { resizeCanvas(); buildGraph(); });
        resizeCanvas(); updateDmFields(); updateOverallStats(); buildGraph(); updateLoop();
    </script>
</body>
</html>
